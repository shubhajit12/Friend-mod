plugins {
	id 'fabric-loom' version '1.13.6'
	id 'maven-publish'
}

version = '3.2.0'
group = 'com.friendmod'

base {
	archivesName = 'friendmod'
}

repositories {
	mavenCentral()
	maven { url 'https://api.modrinth.com/maven' }
}

loom {
	mods {
		"friendmod" {
			sourceSet sourceSets.main
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:1.21.1"
	mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
	modImplementation "net.fabricmc:fabric-loader:0.16.14"
	modImplementation "net.fabricmc.fabric-api:fabric-api:0.107.0+1.21.1"

	// Carpet — compile only, user installs the jar separately
	modCompileOnly("maven.modrinth:carpet:HzPcczDK") { transitive = false }
}

processResources {
	inputs.property "version", project.version
	filteringCharset "UTF-8"
	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

def targetJavaVersion = 21
tasks.withType(JavaCompile).configureEach {
	it.options.encoding = "UTF-8"
	it.options.release = targetJavaVersion
}

java {
	toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
	withSourcesJar()
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.base.archivesName.get()}" }
	}
}
